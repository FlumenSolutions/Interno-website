  <!-- wordmark -->
  <text x="80" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="150"
        font-weight="800" letter-spacing="-5">
    <tspan fill="#E4ECF7">Flu</tspan><tspan fill="#00B8A9">men</tspan>
  </text>
  <!-- tagline -->
  <text x="84" y="350" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46"
